services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amazon_search}
      POSTGRES_USER: ${POSTGRES_USER:-search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-search_demo}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-search} -d ${POSTGRES_DB:-amazon_search}"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.17.0}
    environment:
      cluster.name: ${ES_CLUSTER_NAME:-amazon-search}
      node.name: ${NEXUS_NODE_NAME:-amazon-search-single}
      node.roles: ${NEXUS_NODE_ROLES:-master,data,ingest}
      network.host: 0.0.0.0
      network.publish_host: ${NEXUS_NODE_IP:-elasticsearch}
      transport.publish_host: ${NEXUS_NODE_IP:-elasticsearch}
      http.publish_host: ${NEXUS_NODE_IP:-elasticsearch}
      discovery.seed_hosts: ${ES_SEED_HOSTS:-elasticsearch}
      cluster.initial_master_nodes: ${ES_INITIAL_MASTER_NODES:-amazon-search-single}
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ${ELASTICSEARCH_DATA:-elasticsearch-data}:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.17.0}
    environment:
      SERVER_NAME: kibana
      SERVER_HOST: 0.0.0.0
      SERVER_PUBLICBASEURL: "http://localhost:5601"
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "a]3F9g#Kz!mP7vQ2wR8xY0bN5dL1hJ6c"
      TELEMETRY_ENABLED: "false"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-search}:${POSTGRES_PASSWORD:-search_demo}@postgres:5432/${POSTGRES_DB:-amazon_search}
      ELASTIC_SEMANTIC_INFERENCE_ID: ${ELASTIC_SEMANTIC_INFERENCE_ID:-}
      DATA_DIR: /app/data
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-key.json
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./gcp-key.json:/app/gcp-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      meilisearch:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres-data:
  elasticsearch-data:
  meilisearch-data:
